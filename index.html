<html>
<head>

            border-left: 5px solid blue;

<body>

<div class="header">

        <a href="#">About</a>

                  target="_blank">

        <h2>Your Location</h2>

        <iframe 
            src="https://maps.google.com/maps?q=Nagercoil&t=&z=13&ie=UTF8&iwloc=&output=embed"
